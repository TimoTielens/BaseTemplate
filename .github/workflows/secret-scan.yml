name: secret-scan

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history, so a secret in any past commit is caught

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml
          # gitleaks-action is free for public repos and individual accounts.
          # Organizations need a (free) license key set as a secret:
          # https://github.com/gitleaks/gitleaks-action#organizations
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
