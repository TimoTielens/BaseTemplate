# CI/CD for AppointMe
#
# Flow:
#   test    — build the solution and run all tests (every branch + MR)
#   build   — build the API container in ACR (az acr build, server-side) on main
#   deploy  — repoint the devtest Web App at the new image on main
#
# Azure auth is secret-less via GitLab OIDC federation: GitLab mints an ID token,
# Azure trusts it through a federated credential on the CI identity. No secrets in CI.
#
# Required CI/CD variables (Settings → CI/CD → Variables), all "protected":
#   AZURE_CLIENT_ID        clientId of the CI app registration / managed identity
#   AZURE_TENANT_ID        Azure tenant ID
#   AZURE_SUBSCRIPTION_ID  subscription holding the devtest resource group
#   AZURE_RESOURCE_GROUP   e.g. rg-appointme-devtest
#   ACR_NAME               ACR name (Bicep output containerRegistryName, no .azurecr.io)
#   APP_SERVICE_NAME       Web App name (Bicep output)
# See the one-time Azure setup in infra/README.md (GitLab OIDC section).

stages:
  - test
  - build
  - deploy

variables:
  IMAGE_REPO: appointme-api
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"

# Avoid duplicate pipelines: run for MRs, and for branch pushes only when no MR is open.
workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS'
      when: never
    - if: '$CI_COMMIT_BRANCH'

# --- Security scanning (GitLab default template) ----------------------------
include:
  - template: Security/SAST.gitlab-ci.yml

sast:
  stage: test

# --- Shared: log in to Azure with the GitLab OIDC token ---------------------
.azure-login:
  script:
    - az login --service-principal
        --username "$AZURE_CLIENT_ID"
        --tenant "$AZURE_TENANT_ID"
        --federated-token "$AZURE_OIDC_TOKEN"
        --output none
    - az account set --subscription "$AZURE_SUBSCRIPTION_ID"

# --- Build & run tests ------------------------------------------------------
test:
  stage: test
  image: mcr.microsoft.com/dotnet/sdk:10.0
  interruptible: true
  variables:
    NUGET_PACKAGES: "$CI_PROJECT_DIR/.nuget/packages"
  cache:
    key:
      files:
        - Directory.Packages.props
    paths:
      - .nuget/packages
  script:
    - dotnet restore AppointMe.sln
    - dotnet build AppointMe.sln -c Release --no-restore
    - dotnet test AppointMe.sln -c Release --no-build --logger "console;verbosity=normal"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

# --- Build the container image in ACR (no Docker-in-Docker needed) ----------
build-image:
  stage: build
  image: mcr.microsoft.com/azure-cli:latest
  id_tokens:
    AZURE_OIDC_TOKEN:
      aud: api://AzureADTokenExchange
  script:
    - !reference [.azure-login, script]
    - az acr build
        --registry "$ACR_NAME"
        --image "$IMAGE_REPO:$CI_COMMIT_SHORT_SHA"
        --image "$IMAGE_REPO:latest"
        --file src/AppointMe.Api/Dockerfile
        .
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

# --- Deploy to the devtest Web App ------------------------------------------
deploy-devtest:
  stage: deploy
  image: mcr.microsoft.com/azure-cli:latest
  id_tokens:
    AZURE_OIDC_TOKEN:
      aud: api://AzureADTokenExchange
  environment:
    name: devtest
    url: https://$APP_SERVICE_NAME.azurewebsites.net
  script:
    - !reference [.azure-login, script]
    - az webapp config container set
        --name "$APP_SERVICE_NAME"
        --resource-group "$AZURE_RESOURCE_GROUP"
        --container-image-name "$ACR_NAME.azurecr.io/$IMAGE_REPO:$CI_COMMIT_SHORT_SHA"
    # Force a pull of the new tag; EF migrations run on container startup.
    - az webapp restart --name "$APP_SERVICE_NAME" --resource-group "$AZURE_RESOURCE_GROUP"
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
